<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volume Booster | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

<style>

.controls{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin:20px 0;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

input[type=range]{
width:250px;
}

audio{
width:100%;
margin-top:20px;
}

#status{
text-align:center;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn"
onclick="location.href='../index.html'">

← Back

</button>

<h1>🔊 Volume Booster</h1>

</header>

<main class="tool-container glass">

<h2>Adjust Audio Volume</h2>

<p>Increase or decrease the volume of your audio file.</p>

<input type="file" id="audio" accept="audio/*">

<div class="controls">

<label>

Volume

<input type="range"
id="volume"
min="0"
max="3"
step="0.1"
value="1">

</label>

</div>

<div class="controls">

<button id="process">

🔊 Process Audio

</button>

</div>

<p id="status">Ready</p>

<audio id="player" controls></audio>

<br><br>

<a id="download" style="display:none">

<button>

⬇ Download Audio

</button>

</a>

</main>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

<script>

const {FFmpeg}=FFmpegWASM;
const {fetchFile}=FFmpegUtil;

process.onclick=async()=>{

const file=audio.files[0];

if(!file){

alert("Select audio file.");

return;

}

const ffmpeg=new FFmpeg();

status.innerHTML="Loading FFmpeg...";

await ffmpeg.load();

const ext=file.name.split(".").pop();

await ffmpeg.writeFile("input."+ext,await fetchFile(file));

status.innerHTML="Processing...";

await ffmpeg.exec([
"-i",
"input."+ext,
"-filter:a",
"volume="+volume.value,
"output.mp3"
]);

const data=await ffmpeg.readFile("output.mp3");

const blob=new Blob([data.buffer],{type:"audio/mp3"});

const url=URL.createObjectURL(blob);

player.src=url;

download.href=url;

download.download="volume.mp3";

download.style.display="inline-block";

status.innerHTML="✅ Done";

}

</script>

</body>
</html>
