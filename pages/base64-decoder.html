<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Base64 Decoder | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🔓 Base64 Decoder</h1>

<p>Decode Base64 text into readable text.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Base64 Input</label>

<textarea id="textInput" rows="8"></textarea>

<button id="decodeBtn" class="primary-btn">
Decode
</button>

<label>Decoded Output</label>

<textarea id="textOutput" rows="8" readonly></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

</div>

</main>

<script src="../js/base64-decoder.js"></script>

</body>
</html>
