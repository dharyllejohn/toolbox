<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

<style>

.form{
display:flex;
flex-direction:column;
gap:20px;
margin-top:20px;
}

input{
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
}

button{
padding:12px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:10px;
}

.result{
margin-top:25px;
padding:20px;
border-radius:10px;
background:rgba(255,255,255,.08);
line-height:2;
font-size:18px;
}

</style>

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn"
onclick="location.href='../index.html'">

← Back

</button>

<h1>🎂 Age Calculator</h1>

</header>

<main class="tool-container glass">

<h2>Calculate Your Exact Age</h2>

<p>Select your birth date to calculate your exact age.</p>

<div class="form">

<input
type="date"
id="birthDate">

<button onclick="calculateAge()">

🎂 Calculate Age

</button>

</div>

<div
id="result"
class="result">

Select your birth date.

</div>

</main>

<script>

function calculateAge(){

const birth=document.getElementById("birthDate").value;

if(!birth){

alert("Please select your birth date.");

return;

}

const birthDate=new Date(birth);
const today=new Date();

let years=today.getFullYear()-birthDate.getFullYear();
let months=today.getMonth()-birthDate.getMonth();
let days=today.getDate()-birthDate.getDate();

if(days<0){

months--;

const prevMonth=new Date(
today.getFullYear(),
today.getMonth(),
0
);

days+=prevMonth.getDate();

}

if(months<0){

years--;

months+=12;

}

const diff=today-birthDate;

const totalDays=Math.floor(diff/(1000*60*60*24));

document.getElementById("result").innerHTML=`

<strong>Age:</strong> ${years} years, ${months} months, ${days} days<br><br>

<strong>Total Days:</strong> ${totalDays.toLocaleString()}<br>

<strong>Total Months:</strong> ${(years*12+months).toLocaleString()}<br>

<strong>Total Weeks:</strong> ${Math.floor(totalDays/7).toLocaleString()}

`;

}

</script>

</body>
</html>
