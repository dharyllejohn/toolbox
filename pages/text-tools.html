<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Tools</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
      width: 80%;
      max-width: 600px;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    .stats {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

    <button class="back-btn" onclick="goBack()">⬅ Back to Toolbox</button>

  <h1>📝 Text Tools</h1>

  <div class="box">

    <textarea id="text" placeholder="Type or paste text here..."></textarea>

    <br>

    <button onclick="toUpper()">UPPERCASE</button>
    <button onclick="toLower()">lowercase</button>
    <button onclick="clearText()">Clear</button>

    <div class="stats" id="stats"></div>

  </div>

  <script>
    const textArea = document.getElementById("text");
    const stats = document.getElementById("stats");

    textArea.addEventListener("input", updateStats);

    function updateStats() {
      const text = textArea.value;

      const words = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
      const chars = text.length;

      stats.innerText = `Words: ${words} | Characters: ${chars}`;
    }

    function toUpper() {
      textArea.value = textArea.value.toUpperCase();
      updateStats();
    }

    function toLower() {
      textArea.value = textArea.value.toLowerCase();
      updateStats();
    }

    function clearText() {
      textArea.value = "";
      updateStats();
    }

    updateStats();
  </script>

</body>
</html>
