<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>To-Do List | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

<style>

.form{
display:grid;
grid-template-columns:2fr 1fr 1fr auto;
gap:12px;
margin:20px 0;
}

input,select{
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
}

button{
padding:12px 18px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:10px;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:20px 0;
}

#search{
width:100%;
margin-bottom:20px;
}

.task{

padding:15px;
margin-top:15px;
border-radius:10px;
background:rgba(255,255,255,.08);

}

.completed{

opacity:.6;
text-decoration:line-through;

}

.top{

display:flex;
justify-content:space-between;
align-items:center;
gap:15px;

}

.info{

font-size:14px;
opacity:.8;
margin-top:8px;

}

.actions{

display:flex;
gap:10px;
margin-top:12px;
flex-wrap:wrap;

}

.counter{

margin-top:20px;
font-weight:bold;
text-align:center;

}

@media(max-width:768px){

.form{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn"
onclick="location.href='../index.html'">

← Back

</button>

<h1>✅ To-Do List</h1>

</header>

<main class="tool-container glass">

<h2>Task Manager</h2>

<p>Manage your daily tasks.</p>

<div class="form">

<input
type="text"
id="task"
placeholder="Enter task...">

<select id="priority">

<option>Low</option>
<option selected>Medium</option>
<option>High</option>

</select>

<input
type="date"
id="due">

<button id="addBtn">

➕

</button>

</div>

<input
type="text"
id="search"
placeholder="Search task...">

<div class="filters">

<button onclick="filterTasks('all')">

All

</button>

<button onclick="filterTasks('active')">

Active

</button>

<button onclick="filterTasks('completed')">

Completed

</button>

</div>

<div id="tasks"></div>

<div
id="counter"
class="counter">

0 Task(s)

</div>

</main>

<script>

let todos=JSON.parse(localStorage.getItem("tb_todos"))||[];

let filter="all";

function save(){

localStorage.setItem(

"tb_todos",

JSON.stringify(todos)

);

}

function render(){

const keyword=search.value.toLowerCase();

tasks.innerHTML="";

let shown=0;

todos.forEach((todo,index)=>{

if(

filter==="active" && todo.done ||

filter==="completed" && !todo.done

){

return;

}

if(

!todo.text.toLowerCase().includes(keyword)

){

return;

}

shown++;

tasks.innerHTML+=`

<div class="task ${todo.done?'completed':''}">

<div class="top">

<strong>${todo.text}</strong>

<span>${todo.priority}</span>

</div>

<div class="info">

📅 ${todo.date||'No due date'}

</div>

<div class="actions">

<button onclick="toggle(${index})">

${todo.done?'↩ Undo':'✔ Complete'}

</button>

<button onclick="editTask(${index})">

✏ Edit

</button>

<button onclick="removeTask(${index})">

🗑 Delete

</button>

</div>

</div>

`;

});

counter.innerHTML=shown+" Task(s)";

}

addBtn.onclick=()=>{

const text=task.value.trim();

if(text===""){

alert("Enter a task.");

return;

}

todos.unshift({

text,

priority:priority.value,

date:due.value,

done:false

});

task.value="";

due.value="";

save();

render();

};

function toggle(i){

todos[i].done=!todos[i].done;

save();

render();

}

function removeTask(i){

if(confirm("Delete this task?")){

todos.splice(i,1);

save();

render();

}

}

function editTask(i){

const value=prompt(

"Edit task",

todos[i].text

);

if(value){

todos[i].text=value;

save();

render();

}

}

function filterTasks(v){

filter=v;

render();

}

search.oninput=render;

render();

</script>

</body>
</html>
