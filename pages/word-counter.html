<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>📝 Word Counter</h1>

<p>Count words, characters and reading time instantly.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<h2>Word Counter</h2>

<textarea
id="text"
rows="10"
placeholder="Type or paste your text here..."
style="width:100%;padding:15px;border-radius:12px;"></textarea>

<button
id="analyzeBtn"
class="primary-btn">

📊 Analyze

</button>

<div class="result-box">

<p><strong>Words:</strong> <span id="words">0</span></p>

<p><strong>Characters:</strong> <span id="characters">0</span></p>

<p><strong>Characters (No Spaces):</strong> <span id="noSpaces">0</span></p>

<p><strong>Paragraphs:</strong> <span id="paragraphs">0</span></p>

<p><strong>Reading Time:</strong> <span id="reading">0 sec</span></p>

</div>

</div>

</main>

<script src="../js/word-counter.js"></script>

</body>
</html>
