<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Picker | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🎨 Color Picker</h1>

<p>Convert HEX, RGB and HSL colors instantly.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Select Color</label>

<input
type="color"
id="colorPicker"
value="#4f46e5">

<label>HEX</label>

<input
type="text"
id="hexValue"
readonly>

<label>RGB</label>

<input
type="text"
id="rgbValue"
readonly>

<label>HSL</label>

<input
type="text"
id="hslValue"
readonly>

<button
id="copyBtn"
class="primary-btn">

📋 Copy HEX

</button>

</div>

</main>

<script src="../js/color-picker.js"></script>

</body>
</html>
