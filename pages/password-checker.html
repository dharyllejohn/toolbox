<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

    <button class="back-btn" onclick="location.href='../index.html'">
        ← Back to Tools
    </button>

    <h1>🔑 Password Generator</h1>

    <p>
        Generate secure and random passwords instantly.
    </p>

</header>

<main class="tool-container">

<div class="tool-card">

    <h2>Create Strong Password</h2>

    <div class="input-group">

        <label for="length">
            Password Length
        </label>

        <input
            type="number"
            id="length"
            min="6"
            max="64"
            value="16">

    </div>

    <div class="options">

        <label>
            <input
                type="checkbox"
                id="uppercase"
                checked>

            Include Uppercase (A-Z)
        </label>

        <label>
            <input
                type="checkbox"
                id="lowercase"
                checked>

            Include Lowercase (a-z)
        </label>

        <label>
            <input
                type="checkbox"
                id="numbers"
                checked>

            Include Numbers (0-9)
        </label>

        <label>
            <input
                type="checkbox"
                id="symbols"
                checked>

            Include Symbols (!@#$%)
        </label>

    </div>

    <button
        id="generateBtn"
        class="primary-btn">

        🔄 Generate Password

    </button>

    <div class="result-box">

        <input
            type="text"
            id="passwordOutput"
            readonly
            placeholder="Generated password will appear here">

        <button
            id="copyBtn">

            📋 Copy

        </button>

    </div>

    <div
        id="strength"
        class="strength">

        Password Strength: -

    </div>

</div>

</main>

<script src="../assets/js/password-generator.js"></script>

</body>
