<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Cutter | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

<style>

.controls{

display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin:20px 0;

}

input{

padding:10px;
width:120px;
font-size:16px;
border-radius:8px;

}

button{

padding:12px 20px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:10px;

}

video{

width:100%;
margin-top:20px;
border-radius:10px;

}

#status{

margin-top:20px;
font-weight:bold;
text-align:center;

}

</style>

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn"
onclick="location.href='../index.html'">

← Back

</button>

<h1>✂️ Video Cutter</h1>

</header>

<main class="tool-container glass">

<h2>Trim Video</h2>

<p>Trim videos without quality loss.</p>

<input
type="file"
id="videoFile"
accept="video/*">

<video
id="player"
controls>
</video>

<div class="controls">

<div>

<label>Start</label><br>

<input
type="number"
id="start"
value="0">

</div>

<div>

<label>End</label><br>

<input
type="number"
id="end"
value="10">

</div>

</div>

<div class="controls">

<button id="cut">

✂️ Cut Video

</button>

</div>

<p id="status">

Ready

</p>

<a id="download" style="display:none">

<button>

⬇ Download Video

</button>

</a>

</main>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

<script>

const {FFmpeg}=FFmpegWASM;
const {fetchFile}=FFmpegUtil;

videoFile.onchange=()=>{

player.src=URL.createObjectURL(videoFile.files[0]);

}

cut.onclick=async()=>{

if(videoFile.files.length==0){

alert("Select video.");

return;

}

const file=videoFile.files[0];

const ffmpeg=new FFmpeg();

status.innerHTML="Loading FFmpeg...";

await ffmpeg.load();

const ext=file.name.split(".").pop();

await ffmpeg.writeFile("input."+ext,await fetchFile(file));

status.innerHTML="Processing...";

await ffmpeg.exec([
"-i",
"input."+ext,
"-ss",
start.value,
"-to",
end.value,
"-c",
"copy",
"output.mp4"
]);

const data=await ffmpeg.readFile("output.mp4");

const blob=new Blob([data.buffer],{type:"video/mp4"});

const url=URL.createObjectURL(blob);

player.src=url;

download.href=url;

download.download="trimmed.mp4";

download.style.display="inline-block";

status.innerHTML="✅ Done";

}

</script>

</body>
</html>
