<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timestamp Converter | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">

← Back to Tools

</button>

<h1>⏰ Timestamp Converter</h1>

</header>

<main class="tool-container">

<div class="tool-card">

<input
type="number"
id="timestamp"
placeholder="Unix Timestamp">

<button
id="convertBtn"
class="primary-btn">

Convert

</button>

<div class="result-box">

<input
id="result"
readonly>

<button id="copyBtn">

📋 Copy

</button>

</div>

</div>

</main>

<script src="../js/timestamp-converter.js"></script>

</body>
</html>
