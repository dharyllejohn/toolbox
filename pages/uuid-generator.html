<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UUID Generator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🆔 UUID Generator</h1>

<p>Generate UUID v4 identifiers instantly.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Generated UUID</label>

<textarea
id="uuidOutput"
rows="5"
readonly
style="width:100%;margin-top:10px;"></textarea>

<button
id="generateBtn"
class="primary-btn">

Generate UUID

</button>

<button
id="copyBtn"
class="primary-btn">

📋 Copy UUID

</button>

</div>

</main>

<script src="../js/uuid-generator.js"></script>

</body>
</html>
