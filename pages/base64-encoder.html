<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Base64 Encoder | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🔐 Base64 Encoder</h1>

<p>Convert plain text into Base64.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Input Text</label>

<textarea id="textInput" rows="8"></textarea>

<button id="encodeBtn" class="primary-btn">
Encode
</button>

<label>Encoded Output</label>

<textarea id="textOutput" rows="8" readonly></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

</div>

</main>

<script src="../js/base64-encoder.js"></script>

</body>
</html>
