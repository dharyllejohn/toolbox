<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text Compare | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

<style>

.compare{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;

}

textarea{

width:100%;
height:350px;
padding:15px;
font-size:16px;
border:none;
border-radius:10px;
resize:vertical;

}

button{

padding:12px 20px;
margin-top:20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;

}

.result{

margin-top:25px;
font-size:18px;
font-weight:bold;
text-align:center;

}

@media(max-width:768px){

.compare{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn"
onclick="location.href='../index.html'">

← Back

</button>

<h1>📋 Text Compare</h1>

</header>

<main class="tool-container glass">

<h2>Compare Two Texts</h2>

<p>Check whether two blocks of text are identical.</p>

<div class="compare">

<textarea
id="text1"
placeholder="First text..."></textarea>

<textarea
id="text2"
placeholder="Second text..."></textarea>

</div>

<button onclick="compareText()">

Compare

</button>

<div
id="result"
class="result">

</div>

</main>

<script>

function compareText(){

const a=document.getElementById("text1").value.trim();

const b=document.getElementById("text2").value.trim();

if(a===""||b===""){

result.innerHTML="Please enter both texts.";

return;

}

if(a===b){

result.innerHTML="✅ Texts are identical.";

}else{

const wordsA=a.split(/\s+/).length;

const wordsB=b.split(/\s+/).length;

const charsA=a.length;

const charsB=b.length;

result.innerHTML=`
❌ Texts are different.<br><br>

First Text<br>

Words : ${wordsA}<br>

Characters : ${charsA}<br><br>

Second Text<br>

Words : ${wordsB}<br>

Characters : ${charsB}
`;

}

}

</script>

</body>
</html>
