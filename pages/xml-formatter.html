<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XML Formatter | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>📑 XML Formatter</h1>

<p>Beautify and format XML documents.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>XML Input</label>

<textarea id="xmlInput" rows="10"></textarea>

<button id="formatBtn" class="primary-btn">
Format XML
</button>

<label>Formatted XML</label>

<textarea id="xmlOutput" rows="10" readonly></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

</div>

</main>

<script src="../js/xml-formatter.js"></script>

</body>
</html>
