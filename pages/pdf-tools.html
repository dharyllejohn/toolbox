<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Tools</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
      width: 80%;
      max-width: 500px;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }
  </style>
</head>

<body>

    <button class="back-btn" onclick="goBack()">⬅ Back to Toolbox</button>

  <h1>📄 PDF Tools</h1>

  <div class="box">

    <textarea id="text" placeholder="Write text here to convert into PDF..."></textarea>

    <br>

    <button onclick="downloadPDF()">Download PDF</button>

  </div>

  <script>
    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const text = document.getElementById("text").value;

      if (!text) {
        alert("Walang laman!");
        return;
      }

      doc.text(text, 10, 10);
      doc.save("toolbox.pdf");
    }
  </script>

</body>
</html>
