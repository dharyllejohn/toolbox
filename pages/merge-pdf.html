<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merge PDF | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>📑 Merge PDF</h1>

<p>Combine multiple PDF files into one document.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Select PDF Files</label>

<input
type="file"
id="pdfFiles"
accept="application/pdf"
multiple>

<div id="fileList"></div>

<button id="mergeBtn" class="primary-btn">

📑 Merge PDFs

</button>

<button
id="downloadBtn"
class="primary-btn"
style="display:none;">

⬇ Download PDF

</button>

</div>

</main>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="../js/merge-pdf.js"></script>

</body>
</html>
