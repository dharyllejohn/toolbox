<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JavaScript Formatter | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- JS Beautify -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify.min.js"></script>

<script src="../config.js"></script>
<script src="../guard.js"></script>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

textarea{

    width:100%;
    height:320px;
    padding:15px;
    border:none;
    border-radius:10px;
    resize:vertical;
    box-sizing:border-box;
    font-size:15px;

}

.buttons{

    margin:20px 0;

}

button{

    padding:10px 18px;
    margin-right:10px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;

}

button:hover{

    background:#1d4ed8;

}

#message{

    margin-top:15px;
    font-weight:bold;

}

</style>

</head>

<body style="opacity:0; transition:.3s;">

<div class="container">

<h1>⚡ JavaScript Formatter</h1>

<textarea
id="jsInput"
placeholder="Paste JavaScript code here..."
></textarea>

<div class="buttons">

<button onclick="formatJS()">Format</button>

<button onclick="copyJS()">Copy</button>

<button onclick="clearJS()">Clear</button>

<button onclick="downloadJS()">Download</button>

</div>

<p id="message"></p>

</div>

<script>

function formatJS(){

    const input=document.getElementById("jsInput");
    const msg=document.getElementById("message");

    try{

        input.value=js_beautify(input.value,{
            indent_size:2,
            space_in_empty_paren:true,
            preserve_newlines:true
        });

        msg.innerHTML="✅ JavaScript formatted successfully.";

    }

    catch(error){

        msg.innerHTML="❌ "+error.message;

    }

}

function copyJS(){

    navigator.clipboard.writeText(
        document.getElementById("jsInput").value
    );

    document.getElementById("message").innerHTML="📋 Copied to clipboard.";

}

function clearJS(){

    document.getElementById("jsInput").value="";
    document.getElementById("message").innerHTML="";

}

function downloadJS(){

    const text=document.getElementById("jsInput").value;

    const blob=new Blob(
        [text],
        {type:"application/javascript"}
    );

    const a=document.createElement("a");

    a.href=URL.createObjectURL(blob);

    a.download="formatted.js";

    a.click();

}

</script>

</body>

</html>
