<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Currency Converter | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

<style>

.form{
display:flex;
flex-direction:column;
gap:18px;
margin-top:20px;
}

input,
select{

padding:12px;
font-size:16px;
border:none;
border-radius:10px;
width:100%;

}

.row{

display:grid;
grid-template-columns:1fr 80px 1fr;
gap:15px;
align-items:end;

}

button{

padding:12px 20px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:10px;

}

.result{

margin-top:25px;
padding:20px;
border-radius:10px;
background:rgba(255,255,255,.08);
font-size:22px;
font-weight:bold;
text-align:center;

}

@media(max-width:700px){

.row{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn"
onclick="location.href='../index.html'">

← Back

</button>

<h1>💱 Currency Converter</h1>

</header>

<main class="tool-container glass">

<h2>Live Currency Converter</h2>

<p>

Convert currencies instantly using live exchange rates.

</p>

<div class="form">

<input
type="number"
id="amount"
placeholder="Amount"
value="1"
min="0">

<div class="row">

<div>

<label>From</label>

<select id="from"></select>

</div>

<div style="display:flex;justify-content:center;">

<button id="swap">

⇄

</button>

</div>

<div>

<label>To</label>

<select id="to"></select>

</div>

</div>

<button id="convert">

💱 Convert

</button>

</div>

<div
id="result"
class="result">

Ready

</div>

</main>

<script>

const currencies=[

"USD","PHP","EUR","GBP","JPY","KRW","CNY","AUD","CAD","SGD",

"HKD","THB","MYR","IDR","INR","AED","SAR","CHF","NZD","BRL"

];

const from=document.getElementById("from");
const to=document.getElementById("to");

currencies.forEach(c=>{

from.innerHTML+=`<option value="${c}">${c}</option>`;

to.innerHTML+=`<option value="${c}">${c}</option>`;

});

from.value="USD";
to.value="PHP";

swap.onclick=()=>{

const temp=from.value;

from.value=to.value;

to.value=temp;

};

convert.onclick=async()=>{

const amount=parseFloat(document.getElementById("amount").value);

if(isNaN(amount)||amount<=0){

alert("Enter a valid amount.");

return;

}

result.innerHTML="Loading...";

try{

const res=await fetch(

`https://open.er-api.com/v6/latest/${from.value}`

);

const data=await res.json();

const rate=data.rates[to.value];

const converted=amount*rate;

result.innerHTML=`

${amount.toLocaleString()} ${from.value}

<br>

=

<br>

${converted.toLocaleString(undefined,{

maximumFractionDigits:2

})} ${to.value}

<br><br>

<small>

Rate: 1 ${from.value} = ${rate} ${to.value}

</small>

`;

}catch{

result.innerHTML="Unable to retrieve exchange rates.";

}

};

</script>

</body>
</html>
