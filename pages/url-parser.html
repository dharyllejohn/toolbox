<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URL Parser | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🔗 URL Parser</h1>

<p>Extract URL components instantly.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Enter URL</label>

<input
type="text"
id="urlInput"
placeholder="https://example.com/path?a=1#top">

<button
id="parseBtn"
class="primary-btn">

Parse URL

</button>

<textarea
id="output"
rows="12"
readonly
style="width:100%;margin-top:20px;"></textarea>

</div>

</main>

<script src="../js/url-parser.js"></script>

</body>
</html>
