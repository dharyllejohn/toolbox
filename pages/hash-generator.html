<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator | ToolBox Pro</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">
</head>
<body>

<div class="bg"></div>

<header class="glass">
<button class="back-btn" onclick="location.href='../index.html'">← Back to Tools</button>
<h1>🔐 Hash Generator</h1>
<p>Generate SHA-256 hashes instantly.</p>
</header>

<main class="tool-container">

<div class="tool-card">

<textarea id="text" rows="8" placeholder="Enter text..." style="width:100%;"></textarea>

<button id="generateBtn" class="primary-btn">
Generate Hash
</button>

<textarea id="output" rows="6" readonly style="width:100%;margin-top:20px;"></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

</div>

</main>

<script src="../js/hash-generator.js"></script>

</body>
</html>
