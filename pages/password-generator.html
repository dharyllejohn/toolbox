<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🔐 Password Generator</h1>

<p>Create secure random passwords instantly.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Password Length</label>

<input
type="range"
id="length"
min="6"
max="64"
value="16">

<p>
Length:
<span id="lengthValue">16</span>
</p>

<label>

<input type="checkbox" id="uppercase" checked>

Uppercase (A-Z)

</label>

<label>

<input type="checkbox" id="lowercase" checked>

Lowercase (a-z)

</label>

<label>

<input type="checkbox" id="numbers" checked>

Numbers (0-9)

</label>

<label>

<input type="checkbox" id="symbols" checked>

Symbols (!@#$%)

</label>

<input
type="text"
id="password"
readonly
placeholder="Generated password">

<p id="strength">Strength: Strong</p>

<button
class="primary-btn"
id="generateBtn">

Generate Password

</button>

<button
class="primary-btn"
id="copyBtn">

Copy Password

</button>

</div>

</main>

<script src="../js/password-generator.js"></script>

</body>
</html>
