<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Minifier | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🎨 CSS Minifier</h1>

<p>Compress CSS code instantly.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>CSS Code</label>

<textarea id="input" rows="10"></textarea>

<button id="minifyBtn" class="primary-btn">
Minify CSS
</button>

<textarea id="output" rows="10" readonly style="width:100%;margin-top:20px;"></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

</div>

</main>

<script src="../js/css-minifier.js"></script>

</body>
</html>
