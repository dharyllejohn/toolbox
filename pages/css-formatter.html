<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Formatter | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/js-beautify@1.15.1/js/lib/beautify-css.min.js"></script>

<script src="../config.js"></script>
<script src="../guard.js"></script>

<style>
body{
margin:0;
background:#0f172a;
color:#fff;
font-family:Arial,sans-serif;
}

.container{
max-width:1000px;
margin:40px auto;
padding:20px;
}

textarea{
width:100%;
height:320px;
padding:15px;
border:none;
border-radius:10px;
resize:vertical;
box-sizing:border-box;
font-size:15px;
}

.buttons{
margin:20px 0;
}

button{
padding:10px 18px;
margin-right:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#message{
margin-top:15px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>🎨 CSS Formatter</h1>

<textarea id="cssInput" placeholder="Paste CSS here..."></textarea>

<div class="buttons">

<button onclick="formatCSS()">Format</button>
<button onclick="copyCSS()">Copy</button>
<button onclick="clearCSS()">Clear</button>
<button onclick="downloadCSS()">Download</button>

</div>

<p id="message"></p>

</div>

<script>

function formatCSS(){

const input=document.getElementById("cssInput");
const msg=document.getElementById("message");

try{

input.value=css_beautify(input.value,{
indent_size:2
});

msg.innerText="✅ CSS formatted.";

}catch(e){

msg.innerText="❌ "+e.message;

}

}

function copyCSS(){

navigator.clipboard.writeText(
document.getElementById("cssInput").value
);

document.getElementById("message").innerText="📋 Copied.";

}

function clearCSS(){

document.getElementById("cssInput").value="";
document.getElementById("message").innerText="";

}

function downloadCSS(){

const blob=new Blob(
[document.getElementById("cssInput").value],
{type:"text/css"}
);

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="formatted.css";
a.click();

}

</script>

</body>
</html>
