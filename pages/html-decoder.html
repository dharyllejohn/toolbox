<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML Decoder | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>📋 HTML Decoder</h1>

<p>Decode HTML entities into readable text.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Encoded HTML</label>

<textarea id="input" rows="8"></textarea>

<button id="decodeBtn" class="primary-btn">
Decode
</button>

<textarea id="output" rows="8" readonly style="width:100%;margin-top:20px;"></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

</div>

</main>

<script src="../js/html-decoder.js"></script>

</body>
</html>
