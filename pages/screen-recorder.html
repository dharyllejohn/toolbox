<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Screen Recorder | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

<style>

.controls{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin:20px 0;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:10px;
}

video{
width:100%;
margin-top:20px;
}

#status{
margin-top:20px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn"
onclick="location.href='../index.html'">

← Back

</button>

<h1>🖥️ Screen Recorder</h1>

</header>

<main class="tool-container glass">

<h2>Record Your Screen</h2>

<p>Capture your screen directly in your browser.</p>

<div class="controls">

<button id="startBtn">

▶ Start Recording

</button>

<button id="stopBtn" disabled>

■ Stop Recording

</button>

</div>

<p id="status">

Ready

</p>

<video id="preview" controls></video>

<br><br>

<a id="download" style="display:none">

<button>

⬇ Download Recording

</button>

</a>

</main>

<script>

let recorder;
let chunks=[];

startBtn.onclick=async()=>{

const stream=await navigator.mediaDevices.getDisplayMedia({

video:true,
audio:true

});

preview.srcObject=stream;

recorder=new MediaRecorder(stream);

chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=()=>{

const blob=new Blob(chunks,{type:"video/webm"});

const url=URL.createObjectURL(blob);

preview.srcObject=null;

preview.src=url;

download.href=url;

download.download="screen-recording.webm";

download.style.display="inline-block";

status.innerHTML="✅ Recording Finished";

};

recorder.start();

status.innerHTML="🔴 Recording...";

startBtn.disabled=true;

stopBtn.disabled=false;

}

stopBtn.onclick=()=>{

recorder.stop();

startBtn.disabled=false;

stopBtn.disabled=true;

}

</script>

</body>
</html>
