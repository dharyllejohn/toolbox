<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Base64 Tool | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../guard.js"></script>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

textarea{
    width:100%;
    height:220px;
    padding:15px;
    border:none;
    border-radius:10px;
    resize:vertical;
    font-size:15px;
    box-sizing:border-box;
}

.buttons{
    margin:20px 0;
}

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#message{
    margin-top:15px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>🔑 Base64 Encoder / Decoder</h1>

<textarea id="input" placeholder="Enter text or Base64..."></textarea>

<div class="buttons">

<button onclick="encodeText()">Encode</button>

<button onclick="decodeText()">Decode</button>

<button onclick="copyText()">Copy</button>

<button onclick="clearText()">Clear</button>

</div>

<p id="message"></p>

</div>

<script>

function encodeText(){

try{

const txt=document.getElementById("input").value;

document.getElementById("input").value=btoa(txt);

document.getElementById("message").innerText="✅ Encoded";

}catch{

document.getElementById("message").innerText="❌ Unable to encode";

}

}

function decodeText(){

try{

const txt=document.getElementById("input").value;

document.getElementById("input").value=atob(txt);

document.getElementById("message").innerText="✅ Decoded";

}catch{

document.getElementById("message").innerText="❌ Invalid Base64";

}

}

function copyText(){

navigator.clipboard.writeText(
document.getElementById("input").value
);

document.getElementById("message").innerText="📋 Copied";

}

function clearText(){

document.getElementById("input").value="";

document.getElementById("message").innerText="";

}

</script>

</body>
</html>
