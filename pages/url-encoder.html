<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URL Encoder | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">

← Back to Tools

</button>

<h1>🔗 URL Encoder / Decoder</h1>

</header>

<main class="tool-container">

<div class="tool-card">

<textarea
id="text"
rows="8"
placeholder="Enter URL or text..."
style="width:100%;"></textarea>

<button
id="encodeBtn"
class="primary-btn">

Encode

</button>

<button
id="decodeBtn"
class="primary-btn">

Decode

</button>

<textarea
id="output"
rows="8"
readonly
style="width:100%;margin-top:15px;"></textarea>

<button
id="copyBtn"
class="primary-btn">

📋 Copy

</button>

</div>

</main>

<script src="../js/url-encoder.js"></script>

</body>
</html>
