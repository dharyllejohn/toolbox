<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sharpen Image | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>✨ Sharpen Image</h1>

<p>Improve image sharpness instantly.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<input type="file" id="imageInput" accept="image/*">

<label>Sharpness</label>

<input type="range" id="sharpness" min="100" max="300" value="100">

<canvas id="canvas"></canvas>

<button id="downloadBtn" class="primary-btn">
⬇ Download Image
</button>

</div>

</main>

<script src="../js/image-sharpen.js"></script>

</body>
</html>
