<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>API Tester | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../guard.js"></script>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    width:90%;
    max-width:1100px;
    margin:40px auto;
}

h1{
    text-align:center;
}

.top{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

select,input{
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:15px;
}

select{
    width:120px;
}

input{
    flex:1;
}

textarea{
    width:100%;
    height:180px;
    padding:10px;
    border:none;
    border-radius:8px;
    resize:vertical;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    padding:10px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

pre{
    background:#111827;
    padding:15px;
    border-radius:10px;
    overflow:auto;
    white-space:pre-wrap;
    margin-top:20px;
}

#status{
    margin-top:15px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>⚡ API Tester</h1>

<div class="top">

<select id="method">
<option>GET</option>
<option>POST</option>
<option>PUT</option>
<option>DELETE</option>
</select>

<input
id="url"
placeholder="https://api.example.com/data">

</div>

<h3>JSON Body</h3>

<textarea
id="body"
placeholder='{"name":"John"}'></textarea>

<button onclick="sendRequest()">
Send Request
</button>

<p id="status"></p>

<pre id="response">
Response will appear here...
</pre>

</div>

<script>

async function sendRequest(){

const method=document.getElementById("method").value;

const url=document.getElementById("url").value;

const body=document.getElementById("body").value;

const responseBox=document.getElementById("response");

const status=document.getElementById("status");

status.innerText="⏳ Sending...";

try{

const start=performance.now();

const options={

method,

headers:{
"Content-Type":"application/json"
}

};

if(method!=="GET"){

options.body=body;

}

const res=await fetch(url,options);

const end=performance.now();

const text=await res.text();

status.innerText=
"✅ Status : "+
res.status+
" | "+
Math.round(end-start)+
" ms";

responseBox.textContent=text;

}catch(err){

status.innerText="❌ "+err.message;

}

}

</script>

</body>
</html>
