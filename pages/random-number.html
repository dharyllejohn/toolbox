<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Number Generator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🎲 Random Number Generator</h1>

<p>Generate random numbers instantly.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Minimum</label>

<input
type="number"
id="min"
value="1">

<label>Maximum</label>

<input
type="number"
id="max"
value="100">

<button
id="generateBtn"
class="primary-btn">

Generate

</button>

<div class="result-box">

<input
id="result"
readonly>

<button id="copyBtn">

📋 Copy

</button>

</div>

</div>

</main>

<script src="../js/random-number.js"></script>

</body>
</html>
