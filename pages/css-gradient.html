<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Gradient Generator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🌈 CSS Gradient Generator</h1>

<p>Create beautiful CSS gradients.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Color 1</label>
<input type="color" id="color1" value="#4f46e5">

<label>Color 2</label>
<input type="color" id="color2" value="#06b6d4">

<label>
Angle
<span id="angleValue">90°</span>
</label>

<input
type="range"
id="angle"
min="0"
max="360"
value="90">

<div
id="preview"
style="
width:100%;
height:220px;
border-radius:12px;
margin:25px 0;
border:1px solid rgba(255,255,255,.2);
">
</div>

<label>Generated CSS</label>

<textarea
id="output"
rows="3"
readonly></textarea>

<button
id="copyBtn"
class="primary-btn">

📋 Copy CSS

</button>

</div>

</main>

<script src="../js/css-gradient-generator.js"></script>

</body>
</html>
