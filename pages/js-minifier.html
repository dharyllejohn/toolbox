<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JavaScript Minifier | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>⚡ JavaScript Minifier</h1>

<p>Minify JavaScript by removing comments and unnecessary whitespace.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>JavaScript Code</label>

<textarea id="input" rows="14" placeholder="Paste JavaScript here..."></textarea>

<button id="minifyBtn" class="primary-btn">
⚡ Minify JavaScript
</button>

<label>Minified Code</label>

<textarea id="output" rows="14" readonly></textarea>

<div class="button-group">

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

<button id="clearBtn" class="primary-btn">
🗑 Clear
</button>

</div>

</div>

</main>

<script src="../js/js-minifier.js"></script>

</body>
</html>
