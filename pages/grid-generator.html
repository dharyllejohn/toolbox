<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Grid Generator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🔲 CSS Grid Generator</h1>

<p>Create CSS Grid layouts visually.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Columns</label>

<input type="number" id="columns" min="1" max="6" value="3">

<label>Rows</label>

<input type="number" id="rows" min="1" max="6" value="2">

<label>Gap (px)</label>

<input type="range" id="gap" min="0" max="50" value="10">

<div id="preview"
style="
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(2,80px);
gap:10px;
margin:20px 0;
">

</div>

<textarea id="output" rows="8" readonly></textarea>

<div class="button-group">

<button id="copyBtn" class="primary-btn">
📋 Copy CSS
</button>

<button id="resetBtn" class="primary-btn">
🗑 Reset
</button>

</div>

</div>

</main>

<script src="../js/grid-generator.js"></script>

</body>
</html>
