<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Split PDF | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>✂️ Split PDF</h1>

<p>Extract selected pages from a PDF document.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Select PDF</label>

<input
type="file"
id="pdfFile"
accept="application/pdf">

<label>Pages</label>

<input
type="text"
id="pages"
placeholder="Example: 1,3,5-8">

<button id="splitBtn" class="primary-btn">

✂️ Split PDF

</button>

<button
id="downloadBtn"
class="primary-btn"
style="display:none;">

⬇ Download PDF

</button>

</div>

</main>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="../js/split-pdf.js"></script>

</body>
</html>
