<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JSON Minifier | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>📦 JSON Minifier</h1>

<p>Minify JSON by removing unnecessary spaces.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Paste JSON</label>

<textarea id="jsonInput" rows="10"></textarea>

<button id="minifyBtn" class="primary-btn">
Minify JSON
</button>

<label>Output</label>

<textarea id="jsonOutput" rows="10" readonly></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

</div>

</main>

<script src="../js/json-minifier.js"></script>

</body>
</html>
