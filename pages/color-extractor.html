<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Extractor | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🎨 Color Extractor</h1>

<p>Extract the dominant color from an image.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<input type="file" id="imageInput" accept="image/*">

<canvas id="canvas" style="display:none"></canvas>

<div id="colorBox" style="width:180px;height:180px;border-radius:12px;margin:20px auto;border:2px solid #ddd;"></div>

<textarea id="output" rows="2" readonly></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy HEX
</button>

</div>

</main>

<script src="../js/color-extractor.js"></script>

</body>
</html>
