<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Resume Analyzer</title>


<!-- PDF GENERATOR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

min-height:100vh;

background:
linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);

color:white;

display:flex;
justify-content:center;
align-items:center;

}



.card{

width:500px;

padding:35px;

background:rgba(255,255,255,.1);

backdrop-filter:blur(15px);

border-radius:25px;

text-align:center;

}



h1{

margin-bottom:20px;

}



input,
textarea{

width:100%;

margin:15px 0;

padding:12px;

border-radius:10px;

border:none;

}



textarea{

height:120px;

}



button{

width:100%;

padding:14px;

margin-top:10px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:16px;

cursor:pointer;

}



button:hover{

background:#1d4ed8;

}



.result{

margin-top:20px;

background:rgba(255,255,255,.1);

padding:20px;

border-radius:15px;

}



</style>


</head>



<body>



<div class="card">


<h1>
🤖 AI Resume Analyzer PRO
</h1>


<p>
Upload resume and match with job description
</p>



<input 
type="file"
id="resume"
accept=".pdf,.txt"
>



<textarea
id="job"
placeholder="Paste Job Description here">
</textarea>




<button onclick="analyzeResume()">

🤖 Analyze Resume

</button>



<button onclick="downloadReport()">

📄 Download PDF Report

</button>




<div class="result" id="result">

Waiting for resume...

</div>



</div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<script>


const supabaseUrl =
"https://fdttfybluvhxrceakzkb.supabase.co";


const supabaseKey =
"sb_publishable_FlL1VjQATQZEsXdZzQRpvA_WcXqI1AF";



const client =
supabase.createClient(
supabaseUrl,
supabaseKey
);





async function checkAccess(){


const {data:{user}} =
await client.auth.getUser();



if(!user){

alert("Login required");

window.location.href="../auth.html";

return;

}




const {data,error}=

await client

.from("profiles")

.select("is_pro")

.eq("id",user.id)

.single();




if(error || !data.is_pro){

alert("Upgrade to PRO first");

window.location.href="../index.html";

return;

}



console.log("PRO ACCESS");


}



checkAccess();







async function saveHistory(score,feedback){



const {data:{user}} =
await client.auth.getUser();



if(!user){

return;

}



const {error}=

await client

.from("resume_history")

.insert({

user_id:user.id,

score:score,

feedback:feedback

});



if(error){

console.log(error);

}



}






let finalReport="";





function analyzeResume(){



const file =
document.getElementById("resume").files[0];



const job =
document.getElementById("job").value.toLowerCase();




if(!file){

alert("Upload resume first");

return;

}





let reader = new FileReader();





reader.onload=function(e){



let text =
e.target.result.toLowerCase();





let skills=[

"javascript",
"html",
"css",
"react",
"node",
"mongodb",
"sql",
"api",
"git",
"docker"

];





let score=0;

let found=[];

let missing=[];





skills.forEach(skill=>{



if(text.includes(skill)){


score+=10;

found.push(skill);


}

else{


missing.push(skill);


}



});





if(score>100){

score=100;

}





let match=0;



found.forEach(skill=>{


if(job.includes(skill)){


match+=10;


}


});






finalReport=`

ToolBox AI Resume Report


Resume Score:

${score}/100



Job Match:

${match}%



Skills Found:

${found.join(", ")}



Missing Skills:

${missing.join(", ")}



Recommendation:

Improve missing skills and add more projects.

`;






document.getElementById("result").innerHTML=

`

<h2>
Score: ${score}/100
</h2>


<p>
Job Match:
${match}%
</p>


<p>
Found:
${found.join(", ")}
</p>


<p>
Missing:
${missing.join(", ")}
</p>

`;





saveHistory(
score,
finalReport
);




};



reader.readAsText(file);



}








function downloadReport(){



if(finalReport===""){


alert("Please analyze your resume first");


return;


}





const {jsPDF}=window.jspdf;



const pdf=new jsPDF();





pdf.setFontSize(18);


pdf.text(

"ToolBox AI Resume Report",

20,

20

);





pdf.setFontSize(12);



let lines =
pdf.splitTextToSize(
finalReport,
170
);



pdf.text(

lines,

20,

40

);





pdf.save(

"ToolBox-Resume-Report.pdf"

);



}





</script>



</body>

</html>
