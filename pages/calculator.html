<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .calc {
      width: 260px;
      margin: auto;
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 12px;
    }

    #display {
      width: 100%;
      height: 50px;
      font-size: 20px;
      text-align: right;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1f2937;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #374151;
    }

    .equal {
      grid-column: span 2;
      background: #2563eb;
    }

    .clear {
      background: #ef4444;
    }
  </style>
</head>

<body>

    <button class="back-btn" onclick="goBack()">⬅ Back to Toolbox</button>

  <h1>🧮 Calculator</h1>

  <div class="calc">
    <input type="text" id="display" disabled>

    <div class="buttons">

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('/')">/</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('*')">*</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="append('-')">-</button>

      <button onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button onclick="calculate()">=</button>
      <button onclick="append('+')">+</button>

      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="equal" onclick="calculate()">ENTER</button>

    </div>
  </div>

  <script>
    let display = document.getElementById("display");

    function append(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    }
  </script>

</body>
</html>
