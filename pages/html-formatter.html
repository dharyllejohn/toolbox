<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML Formatter | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/js-beautify@1.15.1/js/lib/beautify-html.min.js"></script>

<script src="../config.js"></script>
<script src="../guard.js"></script>

<style>

body{
    margin:0;
    background:#0f172a;
    color:#fff;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

textarea{
    width:100%;
    height:320px;
    padding:15px;
    border:none;
    border-radius:10px;
    resize:vertical;
    box-sizing:border-box;
    font-size:15px;
}

.buttons{
    margin:20px 0;
}

button{
    padding:10px 18px;
    margin-right:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#message{
    margin-top:15px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🌍 HTML Formatter</h1>

<textarea id="htmlInput" placeholder="Paste HTML here..."></textarea>

<div class="buttons">

<button onclick="formatHTML()">Format</button>
<button onclick="copyHTML()">Copy</button>
<button onclick="clearHTML()">Clear</button>
<button onclick="downloadHTML()">Download</button>

</div>

<p id="message"></p>

</div>

<script>

function formatHTML(){

    const input=document.getElementById("htmlInput");
    const msg=document.getElementById("message");

    try{

        input.value=html_beautify(input.value,{
            indent_size:2,
            wrap_line_length:0
        });

        msg.innerText="✅ HTML formatted.";

    }catch(e){

        msg.innerText="❌ "+e.message;

    }

}

function copyHTML(){

    navigator.clipboard.writeText(
        document.getElementById("htmlInput").value
    );

    document.getElementById("message").innerText="📋 Copied.";

}

function clearHTML(){

    document.getElementById("htmlInput").value="";
    document.getElementById("message").innerText="";

}

function downloadHTML(){

    const blob=new Blob(
        [document.getElementById("htmlInput").value],
        {type:"text/html"}
    );

    const a=document.createElement("a");

    a.href=URL.createObjectURL(blob);
    a.download="formatted.html";
    a.click();

}

</script>

</body>
</html>
