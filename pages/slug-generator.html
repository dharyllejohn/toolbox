<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slug Generator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🔗 Slug Generator</h1>

<p>Create SEO-friendly URL slugs.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Enter Text</label>

<textarea id="input" rows="5"></textarea>

<button id="generateBtn" class="primary-btn">
Generate Slug
</button>

<textarea id="output" rows="3" readonly style="width:100%;margin-top:20px;"></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

</div>

</main>

<script src="../js/slug-generator.js"></script>

</body>
</html>
