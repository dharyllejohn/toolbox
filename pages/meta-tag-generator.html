<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meta Tag Generator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>🏷️ Meta Tag Generator</h1>

<p>Create SEO meta tags for your website.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Title</label>
<input type="text" id="title">

<label>Description</label>
<textarea id="description" rows="3"></textarea>

<label>Keywords</label>
<input type="text" id="keywords">

<label>Author</label>
<input type="text" id="author">

<button id="generateBtn" class="primary-btn">
Generate
</button>

<textarea id="output" rows="10" readonly style="width:100%;margin-top:20px;"></textarea>

<button id="copyBtn" class="primary-btn">
📋 Copy
</button>

</div>

</main>

<script src="../js/meta-tag-generator.js"></script>

</body>
</html>
