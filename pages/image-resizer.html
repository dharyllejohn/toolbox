<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Resizer</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
    }

    input, button {
      margin: 10px;
      padding: 10px;
    }

    button {
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>

    <button class="back-btn" onclick="goBack()">⬅ Back to Toolbox</button>

  <h1>📏 Image Resizer</h1>

  <div class="box">
    <input type="file" id="upload" accept="image/*"><br>

    <input type="number" id="width" placeholder="Width">
    <input type="number" id="height" placeholder="Height"><br>

    <button onclick="resizeImage()">Resize</button><br>

    <a id="download" style="display:none;">Download Image</a>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    function resizeImage() {
      const file = document.getElementById('upload').files[0];
      const width = document.getElementById('width').value;
      const height = document.getElementById('height').value;

      if (!file) return alert("Pumili ng image");

      const reader = new FileReader();

      reader.onload = function(e) {
        const img = new Image();
        img.src = e.target.result;

        img.onload = function() {
          const canvas = document.getElementById('canvas');
          const ctx = canvas.getContext('2d');

          canvas.width = width || img.width;
          canvas.height = height || img.height;

          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          const data = canvas.toDataURL("image/jpeg", 0.8);

          const download = document.getElementById('download');
          download.href = data;
          download.download = "resized.jpg";
          download.style.display = "inline-block";
          download.innerText = "⬇ Download Resized Image";
        }
      }

      reader.readAsDataURL(file);
    }
  </script>

</body>
</html>
