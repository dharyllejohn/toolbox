<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lorem Ipsum Generator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn" onclick="location.href='../index.html'">
← Back to Tools
</button>

<h1>📄 Lorem Ipsum Generator</h1>

<p>Generate placeholder text instantly.</p>

</header>

<main class="tool-container">

<div class="tool-card">

<label>Paragraphs</label>

<input
type="number"
id="count"
value="3"
min="1"
max="20">

<button
id="generateBtn"
class="primary-btn">

Generate

</button>

<textarea
id="output"
rows="12"
readonly
style="width:100%;margin-top:20px;"></textarea>

<button
id="copyBtn"
class="primary-btn">

📋 Copy

</button>

</div>

</main>

<script src="../js/lorem-ipsum.js"></script>

</body>
</html>
