<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JWT Decoder | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../guard.js"></script>

<style>

.tool-box{
max-width:1100px;
margin:40px auto;
}

textarea{
width:100%;
height:180px;
padding:12px;
margin:15px 0;
border:1px solid #ccc;
border-radius:8px;
font-family:monospace;
resize:vertical;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#0077ff;
color:#fff;
font-weight:600;
}

.output{
background:#f4f4f4;
padding:15px;
border-radius:10px;
margin-top:20px;
white-space:pre-wrap;
font-family:monospace;
overflow:auto;
}

</style>

</head>

<body>

<div class="tool-box">

<h1>🔑 JWT Decoder</h1>

<textarea
id="jwtInput"
placeholder="Paste your JWT token here..."
></textarea>

<div class="buttons">

<button onclick="decodeJWT()">Decode</button>

<button onclick="clearJWT()">Clear</button>

<button onclick="copyJWT()">Copy</button>

</div>

<h3>Header</h3>
<div id="header" class="output"></div>

<h3>Payload</h3>
<div id="payload" class="output"></div>

</div>

<script>

function decodeBase64Url(str){

str=str.replace(/-/g,"+").replace(/_/g,"/");

while(str.length%4){

str+="=";

}

return decodeURIComponent(escape(atob(str)));

}

function decodeJWT(){

const token=document.getElementById("jwtInput").value.trim();

const parts=token.split(".");

if(parts.length!==3){

alert("Invalid JWT Token");

return;

}

try{

const header=JSON.parse(decodeBase64Url(parts[0]));

const payload=JSON.parse(decodeBase64Url(parts[1]));

document.getElementById("header").textContent=
JSON.stringify(header,null,4);

document.getElementById("payload").textContent=
JSON.stringify(payload,null,4);

}catch(e){

alert("Unable to decode JWT.");

}

}

function clearJWT(){

jwtInput.value="";
header.textContent="";
payload.textContent="";

}

function copyJWT(){

navigator.clipboard.writeText(payload.textContent);

alert("Payload copied!");

}

</script>

</body>
</html>
<header class="glass">

<button class="back-btn"
onclick="location.href='../index.html'">

← Back to Tools

</button>

<h1>🔑 JWT Decoder</h1>

</body>
</html>
