<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Calculator | ToolBox Pro</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../assets/css/tool.css">

<style>

.form{

display:flex;
flex-direction:column;
gap:15px;
margin-top:20px;

}

input{

padding:12px;
font-size:16px;
border:none;
border-radius:10px;

}

button{

padding:12px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:10px;

}

.result{

margin-top:25px;
font-size:18px;
font-weight:bold;
line-height:1.8;

}

</style>

</head>

<body>

<div class="bg"></div>

<header class="glass">

<button class="back-btn"
onclick="location.href='../index.html'">

← Back

</button>

<h1>💰 Loan Calculator</h1>

</header>

<main class="tool-container glass">

<h2>Loan Payment Calculator</h2>

<p>Estimate your monthly loan payment.</p>

<div class="form">

<input
type="number"
id="amount"
placeholder="Loan Amount">

<input
type="number"
id="interest"
placeholder="Annual Interest (%)">

<input
type="number"
id="years"
placeholder="Loan Term (Years)">

<button onclick="calculate()">

Calculate

</button>

</div>

<div
id="result"
class="result">

</div>

</main>

<script>

function calculate(){

const P=parseFloat(amount.value);

const annual=parseFloat(interest.value)/100;

const years=parseFloat(yearsInput?.value||years.value);

if(isNaN(P)||isNaN(annual)||isNaN(years)){

result.innerHTML="Please fill in all fields.";

return;

}

const r=annual/12;

const n=years*12;

const payment=(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);

const total=payment*n;

const interestPaid=total-P;

result.innerHTML=`

Monthly Payment : ₱ ${payment.toFixed(2)}<br>

Total Payment : ₱ ${total.toFixed(2)}<br>

Total Interest : ₱ ${interestPaid.toFixed(2)}

`;

}

</script>

</body>
</html>
