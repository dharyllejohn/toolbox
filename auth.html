<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
color:white;
}

.box{
width:320px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

a{
color:#93c5fd;
text-decoration:none;
}

#msg{
margin-top:15px;
font-size:14px;
}
</style>

</head>

<body>

<div class="box">

<h2>🔐 Login</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<button onclick="signup()">Sign Up</button>

<div style="margin-top:15px;text-align:right;">
<a href="#" onclick="forgotPassword();return false;"
style="color:#93c5fd;font-size:14px;">
Forgot Password?
</a>
</div>

<p id="msg"></p>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Config -->
<script src="config.js"></script>

<!-- Auth -->
<script src="auth.js"></script>

</body>
</html>
