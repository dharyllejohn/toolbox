<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ToolBox Pro Login</title>

<link rel="stylesheet" href="css/auth.css">

</head>



</head>

<body>

<div id="galaxy"></div>

<div class="stars"></div>

<div class="auth-container">

    <!-- LEFT SIDE -->
    <div class="branding">

    <div class="logo">
        <div class="logo-circle">
            <img src="favicon.png" alt="ToolBox Pro">
        </div>

        <h1>ToolBox Pro</h1>

        <p>Developer & Productivity Suite</p>

        <p class="tagline">
            Everything you need in one toolbox.
        </p>
    </div>

</div>

<!-- RIGHT SIDE -->
<div class="box">

        <div class="card-header">

            <h2>Welcome Back</h2>

            <p>Sign in to continue your account.</p>

        </div>

        <div class="form-group">

            <label for="email">Email Address</label>

            <input
                id="email"
                type="email"
                placeholder="Enter your email">

        </div>

        <div class="form-group">

            <label for="password">Password</label>

            <div class="password-wrapper">

    <input
        id="password"
        type="password"
        placeholder="Enter your password">

    <button
        type="button"
        class="toggle-password"
        onclick="togglePassword()">
        👁
    </button>

</div>

        </div>

        <div class="forgot">
            <a href="#" onclick="forgotPassword();return false;">
                Forgot Password?
            </a>
        </div>

        <button onclick="login()">
            Login
        </button>

        <button class="signup-btn" onclick="signup()">
            Create Account
        </button>

        <p id="msg"></p>

    </div>

</div>

<div class="credit">
    Designed &amp; Developed by<br>
    <strong>Daryl John</strong>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>

<script>
function togglePassword(){
    const input=document.getElementById("password");
    input.type=input.type==="password"?"text":"password";
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/galaxy.js"></script>

</body>
